name: Daily Intelligence Brief

on:
  schedule:
    - cron: "0 11 * * *"   # 7:00 PM SGT = 11:00 UTC
  workflow_dispatch:

jobs:
  send-daily-brief:
    name: Send Daily Brief
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run pipeline
        env:
          NEWSDATA_API_KEY:  ${{ secrets.NEWSDATA_API_KEY }}
          GUARDIAN_API_KEY:  ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: node index.js

      - name: Log failure
        if: failure()
        run: echo "❌ Pipeline failed at $(date -u)"
